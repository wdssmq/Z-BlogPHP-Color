name: phpz
scopeName: text.html.phpz
injectionSelector: L:text.html
patterns:
  - include: "#phpz-block"
  - include: "#phpz-line-begin"
  - include: "#phpz-line-end"
  - include: "#phpz-echo"
repository:

  # {php}...{/php}
  phpz-block:
    begin: ^({)(php)(})
    beginCaptures:
      "1":
        name: punctuation.section.embedded.begin.php
      "2":
        name: keyword.control.php
      "3":
        name: punctuation.section.embedded.end.php
    end: ^({)(\/)(php)(})
    endCaptures:
      "1":
        name: punctuation.section.embedded.begin.php
      "2":
        name: punctuation.definition.tag.begin.html
      "3":
        name: keyword.control.php
      "4":
        name: punctuation.section.embedded.end.php
    patterns:
      - include: source.php

  # {if...}, {foreach...}, {else}, {elseif...}
  phpz-line-begin:
    begin: ({)(if|foreach|else|elseif)
    beginCaptures:
      "1":
        name: punctuation.section.embedded.begin.php
      "2":
        name: keyword.control.php
    end: (})
    endCaptures:
      "1":
        name: punctuation.section.embedded.end.php
    patterns:
      - include: source.php

  # {/if}, {/foreach}
  phpz-line-end:
    patterns:
      - match: ({)(\/)(if|foreach)(})
        name: phpz-line-end
        captures:
          "1":
            name: punctuation.section.embedded.begin.php
          "2":
            name: punctuation.definition.tag.begin.html
          "3":
            name: keyword.control.php
          "4":
            name: punctuation.section.embedded.end.php

  # {$variable}, {template:...}, {module:...}
  phpz-echo:
    patterns:
      - name: phpz-variable
        match: ({)(\\$[^}\\s=]+)[^}]*(})
        captures:
          "1":
            name: punctuation.section.embedded.begin.php
          "2":
            name: variable.other.php
          "3":
            name: punctuation.section.embedded.end.php
      - name: phpz-include
        match: ({)(template):([^}\s]+)(})
        captures:
          "1":
            name: punctuation.section.embedded.begin.php
          "2":
            name: constant.language.php
          "3":
            name: variable.other.php
          "4":
            name: punctuation.section.embedded.end.php
      - name: phpz-module
        match: ({)(module):([^}\s]+)(})
        captures:
          "1":
            name: punctuation.section.embedded.begin.php
          "2":
            name: constant.language.php
          "3":
            name: variable.other.php
          "4":
            name: punctuation.section.embedded.end.php
